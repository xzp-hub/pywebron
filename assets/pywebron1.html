<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyWebron 控制面板</title>
</head>
<script>
    const $ = id => document.getElementById(id);
    let isMaximized = false;

    // 有系统标题栏时，添加类名以占满整个窗口
    if (window.pywebron && window.pywebron.hasSystemTitleBar === true) {
        document.addEventListener('DOMContentLoaded', function() {
            var appRoot = document.getElementById('app-root');
            if (appRoot) {
                appRoot.classList.add('has-system-title-bar');
            }
        });
        // 立即执行一次（防止 DOMContentLoaded 已经触发）
        var appRoot = document.getElementById('app-root');
        if (appRoot) {
            appRoot.classList.add('has-system-title-bar');
        }
    }

    async function windowAction(type) {
        const map = {min: 'minimize_window', max: 'maximize_window', rep: 'reappear_window', shut: 'shutdown_window'};
        const action = type === 'toggle' ? (isMaximized ? 'rep' : 'max') : type;
        try {
            const res = await window.pywebron.invoke('window_controls_invoke', {control_type: map[action]}, 5000);
            if (res?.code === 200) {
                isMaximized = action === 'max' || (type === 'toggle' && !isMaximized);
                console.log('[Window] isMaximized after=', isMaximized);
            }
            if (['max', 'rep', 'toggle'].includes(type)) {
                $('maximizeRestoreBtn').title = isMaximized ? '还原' : '最大化';
                $('maximizeRestoreBtn').querySelector('svg').innerHTML = isMaximized
                    ? '<rect x="4" y="8" width="12" height="12" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="8" y="4" width="12" height="12" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>'
                    : '<rect x="4" y="4" width="16" height="16" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>';
            }
        } catch (e) {
            console.error('[Window]', e.message);
        }
    }

    // Linux 专用：设置窗口拖动
    if (window.pywebron?.isLinux) {
        const header = $('windowHeader');
        if (header) {
            header.addEventListener('mousedown', (e) => {
                if (e.target.closest('.h-ctrls') || e.target.closest('.win-btn')) return;
                window.pywebron.startDrag(1);
            });
            header.addEventListener('dblclick', (e) => {
                if (e.target.closest('.h-ctrls') || e.target.closest('.win-btn')) return;
                windowAction('toggle');
            });
        }
    }
</script>

<body>
<div style="width: 100%; height: 100%; background: transparent; border-radius: 15px;">
    <div id="app-root">
        <div class="header" id="windowHeader">
            <div class="h-left">
                <svg class="h-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="12 2 2 7 12 12 22 7 12 2"/>
                    <polyline points="2 17 12 22 22 17"/>
                    <polyline points="2 12 12 17 22 12"/>
                </svg>
                <span class="h-title">PyWebron 控制面板</span>
            </div>
            <div class="h-ctrls">
                <button class="win-btn" onclick="windowAction('min')" title="最小化">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2">
                        <line x1="4" y1="12" x2="20" y2="12"/>
                    </svg>
                </button>
                <button id="maximizeRestoreBtn" class="win-btn" onclick="windowAction('toggle')" title="最大化">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="1.5">
                        <rect x="4" y="4" width="16" height="16" rx="1"/>
                    </svg>
                </button>
                <button class="win-btn close" onclick="windowAction('shut')" title="关闭">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="content">
        </div>
    </div>
</div>
</body>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html,
    body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: 'Segoe UI', sans-serif;
        background-color: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        outline: none;
        padding: 0;
        margin: 0;
    }

    #app-root {
        position: relative;
        width: calc(100% - 10px);
        height: calc(100% - 10px);
        padding: 5px;
        gap: 5px;
        display: flex;
        flex-direction: column;
        background: linear-gradient(145deg, rgba(65, 65, 117, .9), rgba(68, 58, 96, .95));
        box-sizing: border-box;
        outline: none;
        border-radius: 5px;
        border: 1px solid rgba(255, 255, 255, .25);
    }

    /* 有系统标题栏时，占满整个窗口 */
    #app-root.has-system-title-bar {
        width: 100%;
        height: 100%;
        padding: 0;
        border-radius: 0;
    }

    /* 无边框窗口调整大小区域 - 8px 透明边框 */
    .resize-area {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        z-index: 10000;
    }

    .resize-edge {
        position: absolute;
        pointer-events: auto;
        background: transparent;
    }

    .resize-edge.top,
    .resize-edge.bottom {
        left: 8px;
        right: 8px;
        height: 8px;
    }

    .resize-edge.left,
    .resize-edge.right {
        top: 8px;
        bottom: 8px;
        width: 8px;
    }

    .resize-edge.top {
        top: 0;
        cursor: n-resize;
    }

    .resize-edge.bottom {
        bottom: 0;
        cursor: s-resize;
    }

    .resize-edge.left {
        left: 0;
        cursor: w-resize;
    }

    .resize-edge.right {
        right: 0;
        cursor: e-resize;
    }

    .resize-corner {
        position: absolute;
        width: 8px;
        height: 8px;
        pointer-events: auto;
        background: transparent;
        z-index: 10001;
    }

    .resize-corner.top-left {
        top: 0;
        left: 0;
        cursor: nw-resize;
    }

    .resize-corner.top-right {
        top: 0;
        right: 0;
        cursor: ne-resize;
    }

    .resize-corner.bottom-left {
        bottom: 0;
        left: 0;
        cursor: sw-resize;
    }

    .resize-corner.bottom-right {
        bottom: 0;
        right: 0;
        cursor: se-resize;
    }


    .header {
        width: 100%;
        height: 40px;
        padding: 5px;
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(184, 183, 183, .1);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, .25);
        -webkit-app-region: drag;
        user-select: none;
    }

    .h-left {
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .h-icon {
        width: 30px;
        height: 30px;
        color: #00D4FF;
        filter: drop-shadow(0 0 4px rgba(0, 212, 255, .5));
    }

    .h-title {
        font-size: 20px;
        color: #fff;
        line-height: 30px;
    }

    .h-ctrls {
        display: flex;
        gap: 5px;
        -webkit-app-region: no-drag;
    }

    .win-btn {
        width: 30px;
        height: 30px;
        border: 1px solid rgba(255, 255, 255, .25);
        background: transparent;
        color: rgba(255, 255, 255, .7);
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: .2s;
    }

    .win-btn:hover {
        background: rgba(255, 255, 255, .15);
        color: #fff;
    }

    .win-btn.close:hover {
        background: rgba(239, 68, 68, .8);
    }

    .content {
        flex: 1;
        display: flex;
        gap: 5px;
    }
</style>

<div id="resize-area" class="resize-area">
    <div class="resize-corner top-left"></div>
    <div class="resize-corner top-right"></div>
    <div class="resize-corner bottom-left"></div>
    <div class="resize-corner bottom-right"></div>
    <div class="resize-edge top"></div>
    <div class="resize-edge bottom"></div>
    <div class="resize-edge left"></div>
    <div class="resize-edge right"></div>
</div>

<script>
    (function () {
        // 如果有系统标题栏，隐藏 resize-area，避免与系统边框冲突
        if (window.pywebron && window.pywebron.hasSystemTitleBar === true) {
            var resizeArea = document.getElementById('resize-area');
            if (resizeArea) {
                resizeArea.style.display = 'none';
            }
            return;
        }

        const HT = {
            'top': 12, 'bottom': 15, 'left': 10, 'right': 11,
            'topleft': 13, 'topright': 14, 'bottomleft': 16, 'bottomright': 17
        };

        document.querySelectorAll('.resize-edge, .resize-corner').forEach(el => {
            el.addEventListener('mousedown', (e) => {
                e.preventDefault();
                e.stopPropagation();

                let edge = '';
                if (el.classList.contains('top')) edge = 'top';
                else if (el.classList.contains('bottom')) edge = 'bottom';
                else if (el.classList.contains('left')) edge = 'left';
                else if (el.classList.contains('right')) edge = 'right';
                else if (el.classList.contains('top-left')) edge = 'topleft';
                else if (el.classList.contains('top-right')) edge = 'topright';
                else if (el.classList.contains('bottom-left')) edge = 'bottomleft';
                else if (el.classList.contains('bottom-right')) edge = 'bottomright';

                if (!edge || !window.pywebron?.window_id) return;

                // 调用 Rust 开始调整大小
                window.pywebron.invoke('__rust_start_resize', {
                    window_id: window.pywebron.window_id,
                    hit_test: HT[edge]
                });
            });
        });
    })();
</script>

</html>
