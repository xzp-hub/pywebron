<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PyWebron 控制面板</title>
    <style>
        html,
        body {
            border-radius: 5px;
            overflow: hidden;
            background: transparent;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            box-sizing: border-box
        }

        .app {
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            padding: 5px;
            gap: 5px;
            display: flex;
            flex-direction: column;
            border-radius: 5px;
            background: #1a1b1d
        }

        .header {
            width: 100%;
            height: 30px;
            border-radius: 5px;
            border: 1px solid rgba(255, 255, 255, .25);
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.08)
        }

        .h-left {
            display: flex;
            align-items: center;
            padding-left: 5px
        }

        .h-icon {
            width: 16px;
            height: 16px;
            color: #FFD700;
            margin-right: 10px
        }

        .h-title {
            font-size: 12px;
            color: #fff;
            line-height: 16px
        }

        .h-ctrls {
            display: flex;
            gap: 0
        }

        .win-btn {
            width: 30px;
            height: 30px;
            background: transparent;
            color: rgba(255, 255, 255, .7);
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: .2s
        }

        .win-btn:hover {
            background: rgba(255, 255, 255, .15);
            color: #fff
        }

        .win-btn.close {
            border-top-right-radius: 4px;
            border-bottom-right-radius: 4px;
            margin-right: -1px
        }

        .win-btn.close:hover {
            background: rgba(239, 68, 68, .8)
        }

        .content {
            border-radius: 5px;
            flex: 1;
            display: flex;
            gap: 5px;
            box-sizing: border-box
        }

        .content iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 5px
        }

        /* 与 assets/pywebron.html 一致：全屏固定层 + 仅边缘可点，避免被 iframe 抢走事件 */
        .resize-area {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 9999;
        }

        .resize-corner,
        .resize-edge {
            position: absolute;
            pointer-events: auto;
        }

        .resize-corner.top-left {
            top: 0;
            left: 0;
            width: 10px;
            height: 10px;
            cursor: nw-resize;
        }

        .resize-corner.top-right {
            top: 0;
            right: 0;
            width: 10px;
            height: 10px;
            cursor: ne-resize;
        }

        .resize-corner.bottom-left {
            bottom: 0;
            left: 0;
            width: 10px;
            height: 10px;
            cursor: sw-resize;
        }

        .resize-corner.bottom-right {
            bottom: 0;
            right: 0;
            width: 10px;
            height: 10px;
            cursor: se-resize;
        }

        .resize-edge.top {
            top: 0;
            left: 10px;
            right: 10px;
            height: 5px;
            cursor: n-resize;
        }

        .resize-edge.bottom {
            bottom: 0;
            left: 10px;
            right: 10px;
            height: 5px;
            cursor: s-resize;
        }

        .resize-edge.left {
            top: 10px;
            bottom: 10px;
            left: 0;
            width: 5px;
            cursor: w-resize;
        }

        .resize-edge.right {
            top: 10px;
            bottom: 10px;
            right: 0;
            width: 5px;
            cursor: e-resize;
        }
    </style>
    <script>
        const $ = id => document.getElementById(id);
        let isMaximized = false;
        async function windowAction(type) {
            const map = { min: 'minimize_window', max: 'maximize_window', rep: 'reappear_window', shut: 'shutdown_window' };
            const action = type === 'toggle' ? (isMaximized ? 'rep' : 'max') : type;
            try {
                if (!window.pywebron?.interfaces?.invoke) return;
                const res = await window.pywebron.interfaces.invoke('window_controls_invoke', { control_type: map[action] }, 5000);
                if (res?.code === 200) { isMaximized = action === 'max' || (type === 'toggle' && !isMaximized); }
                if (['max', 'rep', 'toggle'].includes(type)) {
                    $('maximizeRestoreBtn').title = isMaximized ? '还原' : '最大化';
                    $('maximizeRestoreBtn').querySelector('svg').innerHTML = isMaximized
                        ? '<rect x="4" y="8" width="12" height="12" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="8" y="4" width="12" height="12" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>'
                        : '<rect x="4" y="4" width="16" height="16" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>';
                }
            } catch (e) { }
        }
        async function init() {
            if (window.pywebron && window.pywebron.attributes.show_title_bar === true) {
                const appRoot = document.getElementById('app');
                if (appRoot) appRoot.classList.add('has-system-title-bar');
            } else {
                const html = document.documentElement, body = document.body;
                if (html) html.style.border = '1px solid transparent';
                if (body) body.style.border = '1px solid rgba(255,255,255,0.3)';
            }
            try { await window.pywebron.interfaces.invoke('setup_drag_region_invoke', { selector: '#windowHeader' }); } catch (e) { console.error(e); }
        }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init, { once: true }); else init();
    </script>
</head>

<body>
    <div class="app">
        <div class="header" id="windowHeader">
            <div class="h-left">
                <svg class="h-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="12 2 2 7 12 12 22 7 12 2" />
                    <polyline points="2 17 12 22 22 17" />
                    <polyline points="2 12 12 17 22 12" />
                </svg>
                <span class="h-title">PyWebron 控制面板</span>
            </div>
            <div class="h-ctrls">
                <div class="win-btn" onclick="windowAction('min')" title="最小化">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="4" y1="12" x2="20" y2="12" />
                    </svg>
                </div>
                <div id="maximizeRestoreBtn" class="win-btn" onclick="windowAction('toggle')" title="最大化">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <rect x="4" y="4" width="16" height="16" rx="1" />
                    </svg>
                </div>
                <div class="win-btn close" onclick="windowAction('shut')" title="关闭">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </div>
            </div>
        </div>
        <div class="content">
            <iframe src="http://localhost:5173/" frameborder="0"></iframe>
        </div>
    </div>
    <div id="resize-area" class="resize-area">
        <div class="resize-corner top-left"></div>
        <div class="resize-corner top-right"></div>
        <div class="resize-corner bottom-left"></div>
        <div class="resize-corner bottom-right"></div>
        <div class="resize-edge top"></div>
        <div class="resize-edge bottom"></div>
        <div class="resize-edge left"></div>
        <div class="resize-edge right"></div>
    </div>
</body>

</html>
